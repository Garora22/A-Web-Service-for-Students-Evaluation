{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="login-page">
  <div class="login-container">
    <div class="right-section" style="flex: 1;">
      <div class="login-block auth-form">
        <div class="intro-text">
          <h1>Check Your Email</h1>
          <p style="margin: 16px 0 0; color: #555;">If an account exists for that email, we’ve sent a link to reset your password.</p>
          <p style="margin: 8px 0 0; font-size: 14px; color: #888;">In development, the link is printed in the server console.</p>
        </div>
        <p class="auth-footer">
          <a href="{% url 'login' %}">← Back to Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
