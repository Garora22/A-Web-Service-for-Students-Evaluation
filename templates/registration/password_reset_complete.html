{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="login-page">
  <div class="login-container">
    <div class="right-section" style="flex: 1;">
      <div class="login-block auth-form">
        <div class="intro-text">
          <h1>Password Reset Complete</h1>
          <p style="margin: 16px 0 0; color: #555;">Your password has been set. You can sign in with your new password.</p>
        </div>
        <p class="auth-footer">
          <a href="{% url 'login' %}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
