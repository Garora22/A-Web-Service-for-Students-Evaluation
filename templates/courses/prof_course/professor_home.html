<h2>Course Content</h2>

<table border="1">
<tr>
  <th>Title</th>
  <th>Type</th>
  <th>File</th>
  <th>Visible</th>
  <th>Actions</th>
</tr>

{% for m in materials %}
<tr>
  <td>{{ m.title }}</td>
  <td>{{ m.get_content_type_display }}</td>
  <td><a href="{{ m.file.url }}">Download</a></td>
  <td>
    <form method="post" action="/content/toggle/{{ m.id }}/">
      {% csrf_token %}
      <button type="submit">
        {% if m.is_published %}
          Unpublish
        {% else %}
          Publish
        {% endif %}
      </button>
    </form>
  </td>

  <td>
    <form method="post" action="/content/delete/{{ m.id }}/">
      {% csrf_token %}
      <button type="submit">Delete</button>
    </form>
  </td>

</tr>
{% empty %}
<tr><td colspan="4">No content</td></tr>
{% endfor %}
</table>

<hr>

<h3>Add Content</h3>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  Title: <input name="title"><br>
  Type:
  <select name="content_type">
    {% for k,v in content_types %}
      <option value="{{ k }}">{{ v }}</option>
    {% endfor %}
  </select><br>
  File: <input type="file" name="file"><br>
  Publish now: <input type="checkbox" name="is_published"><br>
  <button type="submit">Upload</button>
</form>

<a href="/courses/">← Back to Courses</a>
